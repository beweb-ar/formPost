version: '3.8'
services:
  formpost:
    build: .
    container_name: formpost
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Admin credentials (CHANGE THESE before deploying!)
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=changeme123
      # Server configuration
      - PORT=3000
      - LANG=es
      # Optional: Enable debug mode (bypasses Turnstile for testing)
      # - DEBUG=true
      # Optional: Override SMTP settings via environment variables
      # - SMTP_HOST=smtp.example.com
      # - SMTP_PORT=587
      # - SMTP_SECURE=true
      # - SMTP_FROM=noreply@example.com
      # - SMTP_USER=your_smtp_user
      # - SMTP_PASS=your_smtp_password
    volumes:
      - ./config.json:/app/config.json
      - ./templates:/app/templates
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
