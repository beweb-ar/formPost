<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Backend Admin</title>
    <style>
        :root {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e9ecef;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --border-color: #dee2e6;
            --accent-primary: #4f46e5;
            --accent-hover: #4338ca;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --accent-primary: #6366f1;
            --accent-hover: #818cf8;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
            padding: 2rem;
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }

        .header-actions { display: flex; gap: 0.5rem; align-items: center; }

        h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.025em; }
        h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 1rem; }
        h3 { font-size: 1.125rem; font-weight: 600; margin-bottom: 0.75rem; }

        .theme-toggle, .logout-btn, .header-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .theme-toggle:hover, .logout-btn:hover, .header-btn:hover {
            background: var(--bg-tertiary);
            transform: translateY(-1px);
        }

        .logout-btn { border-color: var(--danger); color: var(--danger); }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 0.625rem 1rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .status-bar-items {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .status-bar-item {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .status-bar-item .value {
            color: var(--text-primary);
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.25rem;
        }

        .website-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
        }

        .website-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent-primary);
        }

        .website-card h4 { margin: 0 0 0.75rem 0; color: var(--accent-primary); font-weight: 700; font-size: 1.05rem; }
        .website-card .card-info { margin-bottom: 0.375rem; font-size: 0.875rem; }
        .website-card strong { color: var(--text-secondary); font-weight: 600; }
        .website-card a { color: var(--accent-primary); text-decoration: none; font-weight: 500; }
        .website-card a:hover { color: var(--accent-hover); text-decoration: underline; }

        .card-stats {
            display: flex;
            gap: 1.5rem;
            padding: 0.75rem 0;
            margin-top: auto;
            border-top: 1px solid var(--border-color);
        }

        .card-stat {
            display: flex;
            flex-direction: column;
        }

        .card-stat-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .card-stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
        }

        .card-stat-value.small {
            font-size: 0.8rem;
        }

        .website-card-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
            flex-wrap: wrap;
        }

        /* Add Card */
        .add-card {
            background: transparent;
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 220px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-secondary);
            font-size: 0.95rem;
            gap: 0.5rem;
        }

        .add-card:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            background: rgba(79, 70, 229, 0.04);
            transform: translateY(-2px);
        }

        .add-card .plus-icon {
            font-size: 2.5rem;
            font-weight: 300;
            line-height: 1;
        }

        .form-group { margin-bottom: 1rem; }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.375rem;
            font-size: 0.875rem;
        }

        input[type="text"],
        input[type="email"],
        input[type="url"],
        input[type="number"],
        input[type="password"],
        select {
            width: 100%;
            max-width: 400px;
            padding: 0.625rem 0.875rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        select { cursor: pointer; }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        input[type="checkbox"] {
            width: 1.25rem; height: 1.25rem; cursor: pointer;
            accent-color: var(--accent-primary);
        }

        button {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.625rem 1.25rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        button:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .btn-danger { background: var(--danger); }
        .btn-danger:hover:not(:disabled) { background: #dc2626; }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.85rem; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
        }
        .btn-outline:hover:not(:disabled) { background: var(--accent-primary); color: white; }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .checkbox-group label { margin-bottom: 0; cursor: pointer; }

        pre.json {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1rem;
            overflow-x: auto;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            max-height: 300px;
        }

        .string { color: #10b981; }
        .number { color: #3b82f6; }
        .boolean { color: #8b5cf6; }
        .null { color: #6b7280; }
        .key { color: #f59e0b; }

        [data-theme="dark"] .string { color: #34d399; }
        [data-theme="dark"] .number { color: #60a5fa; }
        [data-theme="dark"] .boolean { color: #a78bfa; }
        [data-theme="dark"] .null { color: #9ca3af; }
        [data-theme="dark"] .key { color: #fbbf24; }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* Login overlay */
        .login-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-box {
            background: var(--bg-secondary);
            padding: 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 380px;
        }

        .login-box h2 { text-align: center; margin-bottom: 1.5rem; }
        .login-box input { max-width: 100%; }
        .login-box button { width: 100%; margin-top: 0.5rem; }
        .login-error { color: var(--danger); font-size: 0.875rem; margin-top: 0.5rem; text-align: center; }

        /* Toast notifications */
        .toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toast {
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius-md);
            color: white;
            font-weight: 500;
            font-size: 0.9rem;
            box-shadow: var(--shadow-lg);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 3.7s forwards;
            max-width: 400px;
            word-break: break-word;
        }

        .toast-success { background: var(--success); }
        .toast-error { background: var(--danger); }
        .toast-info { background: var(--accent-primary); }

        @keyframes toastIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes toastOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
        }

        .modal h3 { margin-bottom: 1rem; }
        .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }
        .modal input[type="text"],
        .modal input[type="email"],
        .modal input[type="url"],
        .modal input[type="number"],
        .modal input[type="password"] { max-width: 100%; }

        .modal-wide {
            max-width: 95vw;
            width: 95%;
        }

        #detailModal {
            z-index: 600;
        }

        /* Submissions table */
        .submissions-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        .submissions-table th, .submissions-table td {
            padding: 0.5rem 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .submissions-table th {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .submissions-table tr:hover { background: var(--bg-tertiary); }
        .submissions-table td { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .pagination {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            justify-content: center;
            margin-top: 1rem;
        }

        .spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .submissions-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .submissions-modal-header h3 { margin-bottom: 0; }

        .submissions-modal-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .header { flex-direction: column; gap: 1rem; align-items: flex-start; }
            .cards-grid { grid-template-columns: 1fr; }
            .status-bar-items { gap: 0.75rem; }
            .modal-wide { width: 98%; max-width: 98vw; max-height: 90vh; }
            input[type="text"], input[type="email"], input[type="url"], input[type="number"], input[type="password"], select { max-width: 100%; }
            .submissions-table { display: block; overflow-x: auto; }
        }
    </style>
</head>
<body>
    <!-- Login Overlay -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2 data-i18n="loginTitle">Admin Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginUser" data-i18n="username">Username</label>
                    <input type="text" id="loginUser" required autocomplete="username" />
                </div>
                <div class="form-group">
                    <label for="loginPass" data-i18n="password">Password</label>
                    <input type="password" id="loginPass" required autocomplete="current-password" />
                </div>
                <button type="submit" data-i18n="loginBtn">Login</button>
                <div class="login-error" id="loginError"></div>
            </form>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Main content (hidden until login) -->
    <div class="container" id="mainContent" style="display:none;">
        <!-- Header -->
        <div class="header">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <img src="/logo.png" alt="Logo" style="height: 40px; width: auto; object-fit: contain;" />
                <h1>FORMBackend <span style="font-weight:300;color:var(--text-secondary);">|</span> Admin</h1>
            </div>
            <div class="header-actions">
                <button class="header-btn" id="changePasswordBtn" data-i18n="passwordBtn">&#128274; Password</button>
                <button class="theme-toggle" id="themeToggle">
                    <span id="themeIcon"></span>
                    <span id="themeText" data-i18n="darkMode">Dark Mode</span>
                </button>
                <button class="logout-btn" id="logoutBtn" data-i18n="logout">Logout</button>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-bar-items" id="statusItems">
                <div class="status-bar-item"><span class="spinner"></span> Loading...</div>
            </div>
            <button class="btn-sm btn-outline" id="settingsBtn" data-i18n="settingsBtn">&#9881; Settings</button>
        </div>

        <!-- Website Cards Grid -->
        <div class="cards-grid" id="websiteCards">
            <div class="empty-state"><span class="spinner"></span> Loading...</div>
        </div>
    </div>

    <!-- Edit Website Modal -->
    <div class="modal-overlay" id="editModal" style="display:none;">
        <div class="modal">
            <h3><span data-i18n="editWebsite">Edit Website</span>: <span id="editModalTitle"></span></h3>
            <form id="editForm">
                <input type="hidden" name="editId" id="editId" />
                <div class="form-group">
                    <label data-i18n="toEmail">To Email</label>
                    <input type="email" name="editTo" id="editTo" required />
                </div>
                <div class="form-group">
                    <label data-i18n="subjectPrefix">Subject Prefix</label>
                    <input type="text" name="editSubjectPrefix" id="editSubjectPrefix" required />
                </div>
                <div class="form-group">
                    <label data-i18n="redirectUrl">Redirect URL</label>
                    <input type="url" name="editRedirectUrl" id="editRedirectUrl" />
                </div>
                <div class="form-group">
                    <label data-i18n="templatePath">Template Path</label>
                    <input type="text" name="editTemplatePath" id="editTemplatePath" required />
                </div>
                <div class="form-group">
                    <label data-i18n="turnstileKey">Turnstile Secret Key</label>
                    <input type="text" name="editTurnstileKey" id="editTurnstileKey" />
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-outline" onclick="closeEditModal()" data-i18n="cancel">Cancel</button>
                    <button type="submit" id="editSaveBtn" data-i18n="saveChanges">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Submission Detail Modal -->
    <div class="modal-overlay" id="detailModal" style="display:none;">
        <div class="modal">
            <h3 data-i18n="submissionDetails">Submission Details</h3>
            <div id="detailContent"></div>
            <div class="modal-actions">
                <button type="button" onclick="document.getElementById('detailModal').style.display='none'" data-i18n="close">Close</button>
            </div>
        </div>
    </div>

    <!-- Create Website Modal -->
    <div class="modal-overlay" id="createModal" style="display:none;">
        <div class="modal">
            <h3 data-i18n="addNewWebsite">Add New Website</h3>
            <form id="createForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>ID</label>
                        <input type="text" name="id" required placeholder="website-id" />
                    </div>
                    <div class="form-group">
                        <label data-i18n="toEmail">To Email</label>
                        <input type="email" name="to" required placeholder="admin@example.com" />
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label data-i18n="subjectPrefix">Subject Prefix</label>
                        <input type="text" name="subjectPrefix" required placeholder="New form submission" />
                    </div>
                    <div class="form-group">
                        <label data-i18n="redirectUrlOpt">Redirect URL (optional)</label>
                        <input type="url" name="redirectUrl" placeholder="https://example.com/thank-you" />
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label data-i18n="templatePath">Template Path</label>
                        <input type="text" name="templatePath" required placeholder="email-template.html" />
                    </div>
                    <div class="form-group">
                        <label data-i18n="turnstileKeyOpt">Turnstile Secret Key (optional)</label>
                        <input type="text" name="turnstileKey" placeholder="0x4AAAAA..." />
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-outline" onclick="closeCreateModal()" data-i18n="cancel">Cancel</button>
                    <button type="submit" id="createWebsiteBtn" data-i18n="addWebsite">Add Website</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Submissions Modal -->
    <div class="modal-overlay" id="submissionsModal" style="display:none;">
        <div class="modal modal-wide">
            <div class="submissions-modal-header">
                <h3><span data-i18n="submissions">Submissions</span>: <span id="submissionsModalTitle"></span></h3>
                <div class="submissions-modal-actions">
                    <button class="btn-sm" onclick="exportSubmissions(submissionsModalWebsiteId, 'csv')" data-i18n="exportCsv">Export CSV</button>
                    <button class="btn-sm" onclick="exportSubmissions(submissionsModalWebsiteId, 'json')" data-i18n="exportJson">Export JSON</button>
                    <button class="btn-sm btn-danger" onclick="deleteAllSubmissions(submissionsModalWebsiteId)" data-i18n="deleteAll">Delete All</button>
                </div>
            </div>
            <div id="submissionsModalContent">
                <div class="empty-state"><span class="spinner"></span> <span data-i18n="loading">Loading...</span></div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-outline" onclick="closeSubmissionsModal()" data-i18n="close">Close</button>
            </div>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div class="modal-overlay" id="passwordModal" style="display:none;">
        <div class="modal">
            <h3 data-i18n="changePassword">Change Password</h3>
            <form id="passwordFormModal">
                <div class="form-group">
                    <label data-i18n="currentPassword">Current Password</label>
                    <input type="password" name="currentPassword" required />
                </div>
                <div class="form-group">
                    <label data-i18n="newPasswordLabel">New Password (min 8 characters)</label>
                    <input type="password" name="newPassword" required minlength="8" />
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-outline" onclick="closePasswordModal()" data-i18n="cancel">Cancel</button>
                    <button type="submit" class="btn-danger" id="passwordModalBtn" data-i18n="updatePassword">Update Password</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal" style="display:none;">
        <div class="modal modal-wide">
            <h3 data-i18n="settings">Settings</h3>
            <h3 style="margin-top:0.5rem; font-size:1rem;" data-i18n="smtpConfig">SMTP Configuration</h3>
            <form id="settingsSmtpForm">

        function L(key) { return (i18n[currentLang] || i18n.en)[key] || (i18n.en)[key] || key; }

        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(function(el) {
                var key = el.getAttribute('data-i18n');
                var val = L(key);
                if (val) el.innerHTML = val;
            });
        }

        // ========== HTML Escaping ==========
        function esc(str) {
            if (!str) return '';
            var div = document.createElement('div');
            div.textContent = String(str);
            return div.innerHTML;
        }

        // ========== Toast Notifications ==========
        function showToast(message, type) {
            type = type || 'info';
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 4000);
        }

        // ========== Auth ==========
        var auth = sessionStorage.getItem('adm_auth') || '';

        function checkAuth() {
            if (auth) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                loadAll();
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var u = document.getElementById('loginUser').value;
            var p = document.getElementById('loginPass').value;
            var testAuth = 'Basic ' + btoa(u + ':' + p);
            try {
                var res = await fetch('/admin/api/status', { headers: { Authorization: testAuth } });
                if (res.ok) {
                    auth = testAuth;
                    sessionStorage.setItem('adm_auth', auth);
                    document.getElementById('loginOverlay').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                    document.getElementById('loginError').textContent = '';
                    loadAll();
                } else {
                    document.getElementById('loginError').textContent = L('invalidCredentials');
                }
            } catch (err) {
                document.getElementById('loginError').textContent = L('connectionError');
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', function() {
            sessionStorage.removeItem('adm_auth');
            auth = '';
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
        });

        // ========== Loading helpers ==========
        function setLoading(btn, loading) {
            if (loading) {
                btn.disabled = true;
                btn.dataset.origText = btn.textContent;
                btn.innerHTML = '<span class="spinner"></span> Saving...';
            } else {
                btn.disabled = false;
                btn.textContent = btn.dataset.origText || 'Save';
            }
        }

        // ========== Syntax Highlight ==========
        function syntaxHighlight(json) {
            if (typeof json != 'string') json = JSON.stringify(json, undefined, 2);
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"]*)"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?)/g, function(match) {
                var cls = 'number';
                if (/^"/.test(match)) { cls = /:$/.test(match) ? 'key' : 'string'; }
                else if (/true|false/.test(match)) { cls = 'boolean'; }
                else if (/null/.test(match)) { cls = 'null'; }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        // ========== Load All ==========
        function loadAll() {
            loadStatus();
            loadWebsitesWithStats();
        }

        // ========== Status Bar ==========
        async function loadStatus() {
            try {
                var res = await fetch('/admin/api/status', { headers: { Authorization: auth } });
                var data = await res.json();
                // Set lang from server
                if (data.lang && i18n[data.lang]) {
                    currentLang = data.lang;
                    applyTranslations();
                }
                var uptime = Math.floor(data.uptime);
                var hours = Math.floor(uptime / 3600);
                var mins = Math.floor((uptime % 3600) / 60);
                var uptimeStr = hours > 0 ? hours + 'h ' + mins + 'm' : mins + 'm';
                var mem = data.memory;
                var totalSubs = data.totalSubmissions || 0;
                document.getElementById('statusItems').innerHTML =
                    '<div class="status-bar-item"><span class="status-dot"></span> <span class="value">' + esc(data.status).toUpperCase() + '</span></div>' +
                    '<div class="status-bar-item">' + L('port') + ': <span class="value">' + esc(String(data.port)) + '</span></div>' +
                    '<div class="status-bar-item">' + L('uptime') + ': <span class="value">' + uptimeStr + '</span></div>' +
                    '<div class="status-bar-item">' + L('memory') + ': <span class="value">' + mem.used + '/' + mem.total + ' MB</span></div>' +
                    '<div class="status-bar-item">' + L('sites') + ': <span class="value">' + data.config.websites.length + '</span></div>' +
                    '<div class="status-bar-item">' + L('totalSubs') + ': <span class="value">' + totalSubs + '</span></div>';
            } catch(e) {
                document.getElementById('statusItems').innerHTML =
                    '<div class="status-bar-item">' + L('statusUnavailable') + '</div>';
            }
        }

        // ========== Websites + Stats ==========
        async function loadWebsitesWithStats() {
            try {
                var results = await Promise.all([
                    fetch('/admin/api/websites', { headers: { Authorization: auth } }),
                    fetch('/admin/api/statistics', { headers: { Authorization: auth } })
                ]);
                var websites = await results[0].json();
                var stats = await results[1].json();
                renderWebsiteCards(websites, stats);
            } catch(e) {
                document.getElementById('websiteCards').innerHTML =
                    '<div class="empty-state">' + L('failedLoadWebsites') + '</div>';
            }
        }

        function renderWebsiteCards(websites, stats) {
            var container = document.getElementById('websiteCards');
            var entries = Object.entries(websites || {});

            var html = entries.map(function(entry) {
                var id = entry[0], cfg = entry[1];
                var stat = (stats && stats[id]) || {};
                var subCount = stat.successfulSubmissions || 0;
                var lastSub = stat.lastSubmission
                    ? new Date(stat.lastSubmission).toLocaleString()
                    : L('never');
                var redirect = cfg.redirectUrl
                    ? '<div class="card-info"><strong>' + L('redirect') + ':</strong> <a href="' + esc(cfg.redirectUrl) + '" target="_blank">' + esc(cfg.redirectUrl) + '</a></div>'
                    : '';
                var turnstile = cfg.turnstileKey
                    ? '<div class="card-info"><strong>Turnstile:</strong> ' + L('turnstileEnabled') + '</div>'
                    : '';

                return '<div class="website-card">' +
                    '<h4>' + esc(id) + '</h4>' +
                    '<div class="card-info"><strong>' + L('to') + ':</strong> ' + esc(cfg.to) + '</div>' +
                    '<div class="card-info"><strong>' + L('subject') + ':</strong> ' + esc(cfg.subjectPrefix) + '</div>' +
                    redirect + turnstile +
                    '<div class="card-info"><strong>' + L('template') + ':</strong> ' + esc(cfg.templatePath) + '</div>' +
                    '<div class="card-stats">' +
                        '<div class="card-stat"><span class="card-stat-value">' + subCount + '</span><span class="card-stat-label">' + L('submissions') + '</span></div>' +
                        '<div class="card-stat"><span class="card-stat-value small">' + esc(lastSub) + '</span><span class="card-stat-label">' + L('lastSubmission') + '</span></div>' +
                    '</div>' +
                    '<div class="website-card-actions">' +
                        '<button class="btn-sm" onclick="openSubmissionsModal(\'' + esc(id) + '\')">' + L('submissions') + '</button>' +
                        '<button class="btn-sm btn-outline" onclick="openEditModal(\'' + esc(id) + '\')">' + L('edit') + '</button>' +
                        '<button class="btn-sm btn-danger" onclick="deleteWebsite(\'' + esc(id) + '\')">' + L('delete') + '</button>' +
                    '</div>' +
                    '</div>';
            }).join('');

            // Add the "+" card
            html += '<div class="add-card" onclick="openCreateModal()">' +
                '<span class="plus-icon">+</span>' +
                '<span>' + L('addWebsiteCard') + '</span>' +
                '</div>';

            container.innerHTML = html;
        }

        // ========== Create Website Modal ==========
        function openCreateModal() {
            document.getElementById('createForm').reset();
            document.getElementById('createModal').style.display = 'flex';
        }

        function closeCreateModal() {
            document.getElementById('createModal').style.display = 'none';
        }

        document.getElementById('createForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var btn = document.getElementById('createWebsiteBtn');
            setLoading(btn, true);
            var formData = new FormData(e.target);
            var payload = {
                id: formData.get('id'),
                config: {
                    to: formData.get('to'),
                    subjectPrefix: formData.get('subjectPrefix'),
                    templatePath: formData.get('templatePath')
                }
            };
            var redirectUrl = formData.get('redirectUrl');
            if (redirectUrl) payload.config.redirectUrl = redirectUrl;
            var turnstileKey = formData.get('turnstileKey');
            if (turnstileKey) payload.config.turnstileKey = turnstileKey;
            try {
                var res = await fetch('/admin/api/websites', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', Authorization: auth },
                    body: JSON.stringify(payload)
                });
                var result = await res.json();
                if (res.ok) {
                    showToast(L('websiteAdded'), 'success');
                    closeCreateModal();
                    loadWebsitesWithStats();
                    loadStatus();
                } else {
                    showToast(result.error || L('failedAdd'), 'error');
                }
            } catch(err) {
                showToast(L('connError'), 'error');
            }
            setLoading(btn, false);
        });

        // ========== Edit Website ==========
        var websitesCache = {};

        async function openEditModal(id) {
            try {
                var res = await fetch('/admin/api/websites', { headers: { Authorization: auth } });
                var data = await res.json();
                websitesCache = data;
                var cfg = data[id];
                if (!cfg) return showToast(L('websiteNotFound'), 'error');
                document.getElementById('editId').value = id;
                document.getElementById('editModalTitle').textContent = id;
                document.getElementById('editTo').value = cfg.to || '';
                document.getElementById('editSubjectPrefix').value = cfg.subjectPrefix || '';
                document.getElementById('editRedirectUrl').value = cfg.redirectUrl || '';
                document.getElementById('editTemplatePath').value = cfg.templatePath || '';
                document.getElementById('editTurnstileKey').value = cfg.turnstileKey || '';
                document.getElementById('editModal').style.display = 'flex';
            } catch(e) {
                showToast(L('failedLoadData'), 'error');
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var btn = document.getElementById('editSaveBtn');
            setLoading(btn, true);
            var id = document.getElementById('editId').value;
            var payload = {
                to: document.getElementById('editTo').value,
                subjectPrefix: document.getElementById('editSubjectPrefix').value,
                redirectUrl: document.getElementById('editRedirectUrl').value,
                templatePath: document.getElementById('editTemplatePath').value
            };
            var turnstileKey = document.getElementById('editTurnstileKey').value;
            if (turnstileKey) payload.turnstileKey = turnstileKey;
            try {
                var res = await fetch('/admin/api/websites/' + encodeURIComponent(id), {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', Authorization: auth },
                    body: JSON.stringify(payload)
                });
                var result = await res.json();
                if (res.ok) {
                    showToast(L('websiteUpdated'), 'success');
                    closeEditModal();
                    loadWebsitesWithStats();
                } else {
                    showToast(result.error || L('failedUpdate'), 'error');
                }
            } catch(err) {
                showToast(L('connError'), 'error');
            }
            setLoading(btn, false);
        });

        // ========== Delete Website ==========
        async function deleteWebsite(id) {
            if (!confirm(L('confirmDelete').replace('{id}', id))) return;
            try {
                var res = await fetch('/admin/api/websites/' + encodeURIComponent(id), {
                    method: 'DELETE',
                    headers: { Authorization: auth }
                });
                if (res.ok) {
                    showToast(L('websiteDeleted'), 'success');
                    loadWebsitesWithStats();
                    loadStatus();
                } else {
                    var result = await res.json();
                    showToast(result.error || L('failedDelete'), 'error');
                }
            } catch(err) {
                showToast(L('connError'), 'error');
            }
        }

        // ========== SMTP (Settings Modal) ==========
        async function loadSmtp() {
            try {
                var res = await fetch('/admin/api/smtp', { headers: { Authorization: auth } });
                if (!res.ok) return;
                var data = await res.json();
                document.querySelector('#settingsSmtpForm input[name="host"]').value = data.host || '';
                document.querySelector('#settingsSmtpForm input[name="port"]').value = data.port || '';
                document.querySelector('#settingsSmtpForm input[name="secure"]').checked = !!data.secure;
                document.querySelector('#settingsSmtpForm input[name="from"]').value = data.from || '';
                if (data.user && data.user !== '****') {
                    document.querySelector('#settingsSmtpForm input[name="user"]').value = data.user;
                }
            } catch(e) {}
        }

        document.getElementById('settingsSmtpForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var btn = document.getElementById('settingsSmtpBtn');
            setLoading(btn, true);
            var formData = new FormData(e.target);
            var payload = {
                host: formData.get('host'),
                port: Number(formData.get('port')),
                secure: formData.get('secure') === 'on',
                from: formData.get('from')
            };
            var user = formData.get('user');
            var pass = formData.get('pass');
            if (user) payload.user = user;
            if (pass) payload.pass = pass;
            try {
                var res = await fetch('/admin/api/smtp', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', Authorization: auth },
                    body: JSON.stringify(payload)
                });
                var result = await res.json();
                if (res.ok) {
                    showToast(L('smtpSaved'), 'success');
                    loadSmtp();
                } else {
                    showToast(result.error || L('failedSmtp'), 'error');
                }
            } catch(err) {
                showToast(L('connError'), 'error');
            }
            setLoading(btn, false);
        });

        function openSettingsModal() {
            loadSmtp();
            document.getElementById('settingsModal').style.display = 'flex';
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').style.display = 'none';
        }

        // ========== Statistics ==========
        async function resetStatistics(websiteId) {
            if (!confirm(L('confirmResetStats').replace('{id}', websiteId))) return;
            try {
                var res = await fetch('/admin/api/statistics/' + encodeURIComponent(websiteId) + '/reset', {
                    method: 'PUT',
                    headers: { Authorization: auth }
                });
                if (res.ok) {
                    showToast(L('statsReset'), 'success');
                    loadWebsitesWithStats();
                } else {
                    showToast(L('failedResetStats'), 'error');
                }
            } catch(e) {
                showToast(L('connError'), 'error');
            }
        }

        // ========== Submissions Modal ==========
        var submissionsModalWebsiteId = '';
        var submissionsModalPage = 1;

        function openSubmissionsModal(websiteId) {
            submissionsModalWebsiteId = websiteId;
            submissionsModalPage = 1;
            document.getElementById('submissionsModalTitle').textContent = websiteId;
            document.getElementById('submissionsModal').style.display = 'flex';
            loadModalSubmissions();
        }

        function closeSubmissionsModal() {
            document.getElementById('submissionsModal').style.display = 'none';
        }

        async function loadModalSubmissions(page) {
            if (page) submissionsModalPage = page;
            var container = document.getElementById('submissionsModalContent');
            container.innerHTML = '<div class="empty-state"><span class="spinner"></span> Loading...</div>';
            try {
                var res = await fetch('/admin/api/submissions/' + encodeURIComponent(submissionsModalWebsiteId) +
                    '?page=' + submissionsModalPage + '&limit=20', {
                    headers: { Authorization: auth }
                });
                var data = await res.json();
                renderModalSubmissions(data);
            } catch(e) {
                container.innerHTML = '<div class="empty-state">' + L('failedLoadSubmissions') + '</div>';
            }
        }

        // Convert field key to display label
        function fieldLabel(key) {
            return key.replace(/[_-]/g, ' ').replace(/([a-z])([A-Z])/g, '$1 $2').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
        }

        function renderModalSubmissions(data) {
            var container = document.getElementById('submissionsModalContent');
            if (!data.submissions || (data.submissions.length === 0 && data.total === 0)) {
                container.innerHTML = '<div class="empty-state">' + L('noSubmissions') + '</div>';
                return;
            }
            // Detect dynamic columns from submissions (exclude metadata)
            var meta = ['id', 'timestamp', 'ip'];
            var colSet = {};
            data.submissions.forEach(function(s) {
                Object.keys(s).forEach(function(k) {
                    if (meta.indexOf(k) === -1) colSet[k] = true;
                });
            });
            var cols = Object.keys(colSet);
            // Build table header
            var table = '<div style="overflow-x:auto;"><table class="submissions-table"><thead><tr><th>' + L('date') + '</th>';
            cols.forEach(function(c) { table += '<th>' + esc(fieldLabel(c)) + '</th>'; });
            table += '</tr></thead><tbody>';
            data.submissions.forEach(function(s) {
                table += '<tr onclick="showSubmissionDetail(' + JSON.stringify(JSON.stringify(s)).replace(/'/g, "\\'") + ')" style="cursor:pointer;">';
                table += '<td>' + esc(new Date(s.timestamp).toLocaleString()) + '</td>';
                cols.forEach(function(c) {
                    var val = String(s[c] || '');
                    if (val.length > 60) val = val.substring(0, 60) + '...';
                    table += '<td>' + esc(val) + '</td>';
                });
                table += '</tr>';
            });
            table += '</tbody></table></div>';

            // Pagination
            var pagination = '<div class="pagination">';
            if (submissionsModalPage > 1) {
                pagination += '<button class="btn-sm btn-outline" onclick="loadModalSubmissions(' + (submissionsModalPage - 1) + ')">' + L('previous') + '</button>';
            }
            pagination += '<span>' + L('page') + ' ' + data.page + ' ' + L('of') + ' ' + data.totalPages + ' (' + data.total + ' ' + L('total') + ')</span>';
            if (submissionsModalPage < data.totalPages) {
                pagination += '<button class="btn-sm btn-outline" onclick="loadModalSubmissions(' + (submissionsModalPage + 1) + ')">' + L('next') + '</button>';
            }
            pagination += '</div>';

            container.innerHTML = table + pagination;
        }

        function showSubmissionDetail(jsonStr) {
            var s = JSON.parse(jsonStr);
            var content = '<div style="display:grid;gap:0.75rem;">';
            // Show timestamp first
            if (s.timestamp) {
                content += '<div><strong>' + L('date') + ':</strong> ' + esc(new Date(s.timestamp).toLocaleString()) + '</div>';
            }
            // Show all dynamic fields (skip metadata)
            var meta = ['id', 'timestamp', 'ip'];
            Object.keys(s).forEach(function(key) {
                if (meta.indexOf(key) === -1 && s[key]) {
                    content += '<div><strong>' + esc(fieldLabel(key)) + ':</strong> ' + esc(String(s[key])) + '</div>';
                }
            });
            // Show metadata at the end
            if (s.ip) content += '<div><strong>IP:</strong> ' + esc(s.ip) + '</div>';
            if (s.id) content += '<div><strong>ID:</strong> ' + esc(s.id) + '</div>';
            content += '</div>';
            document.getElementById('detailContent').innerHTML = content;
            document.getElementById('detailModal').style.display = 'flex';
        }

        async function exportSubmissions(websiteId, format) {
            try {
                var res = await fetch('/admin/api/submissions/' + encodeURIComponent(websiteId) + '/export?format=' + format, {
                    headers: { Authorization: auth }
                });
                var blob = await res.blob();
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'submissions-' + websiteId + '.' + format;
                a.click();
                URL.revokeObjectURL(url);
                showToast(L('exportDownloaded'), 'success');
            } catch(e) {
                showToast(L('exportFailed'), 'error');
            }
        }

        async function deleteAllSubmissions(websiteId) {
            if (!confirm(L('confirmDeleteSubs').replace('{id}', websiteId))) return;
            try {
                var res = await fetch('/admin/api/submissions/' + encodeURIComponent(websiteId), {
                    method: 'DELETE',
                    headers: { Authorization: auth }
                });
                if (res.ok) {
                    showToast(L('subsDeleted'), 'success');
                    loadModalSubmissions();
                    loadWebsitesWithStats();
                } else {
                    showToast(L('failedDeleteSubs'), 'error');
                }
            } catch(e) {
                showToast(L('connError'), 'error');
            }
        }

        // ========== Password Modal ==========
        function openPasswordModal() {
            document.getElementById('passwordFormModal').reset();
            document.getElementById('passwordModal').style.display = 'flex';
        }

        function closePasswordModal() {
            document.getElementById('passwordModal').style.display = 'none';
        }

        document.getElementById('passwordFormModal').addEventListener('submit', async function(e) {
            e.preventDefault();
            var btn = document.getElementById('passwordModalBtn');
            setLoading(btn, true);
            var formData = new FormData(e.target);
            var currentPassword = formData.get('currentPassword');
            var newPassword = formData.get('newPassword');

            if (newPassword.length < 8) {
                showToast(L('passwordMinLength'), 'error');
                setLoading(btn, false);
                return;
            }

            try {
                var res = await fetch('/admin/api/admin/reset-password', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', Authorization: auth },
                    body: JSON.stringify({ currentPassword: currentPassword, newPassword: newPassword })
                });
                var result = await res.json();
                if (res.ok) {
                    showToast(L('passwordUpdatedRelogin'), 'success');
                    closePasswordModal();
                    sessionStorage.removeItem('adm_auth');
                    auth = '';
                    setTimeout(function() {
                        document.getElementById('loginOverlay').style.display = 'flex';
                        document.getElementById('mainContent').style.display = 'none';
                    }, 1500);
                } else {
                    showToast(result.error || L('failedUpdate'), 'error');
                }
            } catch(err) {
                showToast(L('connError'), 'error');
            }
            setLoading(btn, false);
        });

        // ========== Theme ==========
        function initTheme() {
            var saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
            updateThemeButton(saved);
        }

        function updateThemeButton(theme) {
            document.getElementById('themeIcon').textContent = theme === 'dark' ? '☀️' : '🌙';
            document.getElementById('themeText').textContent = theme === 'dark' ? L('lightMode') : L('darkMode');
        }

        document.getElementById('themeToggle').addEventListener('click', function() {
            var current = document.documentElement.getAttribute('data-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeButton(next);
        });

        // ========== Header button listeners ==========
        document.getElementById('changePasswordBtn').addEventListener('click', openPasswordModal);
        document.getElementById('settingsBtn').addEventListener('click', openSettingsModal);

        // ========== Close modals on overlay click ==========
        ['editModal', 'detailModal', 'createModal', 'submissionsModal', 'passwordModal', 'settingsModal'].forEach(function(id) {
            document.getElementById(id).addEventListener('click', function(e) {
                if (e.target === this) this.style.display = 'none';
            });
        });

        // Init
        initTheme();
        checkAuth();
    </script>
</body>
</html>
